<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Responsive + iOS Safe Area -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <!-- Primary SEO -->
  <title>Premix - Web Player: Listen Your Way</title>

  <meta
    name="description"
    content="Premix is a modern music streaming platform for discovering, organizing, and enjoying your favorite music."
  />

  <meta
    name="keywords"
    content="Premix, music streaming, playlists, songs, artists, audio, music player"
  />

  <meta
    name="author"
    content="Satyajeet Singh"
  />

  <meta
    name="application-name"
    content="Premix"
  />

  <meta
    name="robots"
    content="noindex, nofollow"
  />

  <!-- Theme -->
  <meta
    name="theme-color"
    content="#fa243c"
  />

  <!-- PWA -->
  <link
    rel="manifest"
    href="/manifest.json"
  />

  <!-- Favicons -->
  <link
    rel="icon"
    type="image/png"
    sizes="32x32"
    href="public/favicon_white.ico"
  />

  <link
    rel="icon"
    type="image/png"
    sizes="16x16"
    href="public/favicon_white.ico"
  />

  <link
    rel="apple-touch-icon"
    sizes="180x180"
    href="public/favicon_white.ico"
  />

  <!-- Apple PWA -->
  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  />

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="default"
  />

  <meta
    name="apple-mobile-web-app-title"
    content="Premix"
  />

  <!-- Microsoft -->
  <meta
    name="msapplication-TileColor"
    content="#fa243c"
  />

  <!-- Open Graph -->
  <meta
    property="og:type"
    content="website"
  />

  <meta
    property="og:title"
    content="Premix"
  />

  <meta
    property="og:description"
    content="Discover, stream, and enjoy your favorite music with Premix."
  />

  <meta
    property="og:image"
    content="/icons/icon-512x512.png"
  />

  <meta
    property="og:site_name"
    content="Premix"
  />

  <!-- Twitter / X -->
  <meta
    name="twitter:card"
    content="summary"
  />

  <meta
    name="twitter:title"
    content="Premix"
  />

  <meta
    name="twitter:description"
    content="Discover, stream, and enjoy your favorite music with Premix."
  />

  <meta
    name="twitter:image"
    content="/icons/icon-512x512.png"
  />

</head>

<body>
  <div id="root"></div>

  <script
    type="module"
    src="/src/main.tsx"
  ></script>
</body>

</html>
